<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DivertiPay — Painel do Cliente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f4f6f9; --card: #ffffff; --accent: #f97316; --green: #22c55e; --red: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--accent); color: white; font-weight: 700; cursor: pointer; }
        .btn-secondary { background: #64748b; margin-top: 5px; font-size: 12px; }
        .status { font-size: 12px; font-weight: 700; }
        .online { color: var(--green); }
        .offline { color: var(--red); }
        .token-display { background: #f8fafc; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 11px; word-break: break-all; margin: 10px 0; border: 1px solid #e2e8f0; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>

<div class="container">
    <div id="view-login" class="card">
        <h2 style="text-align:center">DivertiPay</h2>
        <input type="email" id="login-email" placeholder="Seu email">
        <input type="password" id="login-senha" placeholder="Sua senha">
        <button class="btn" onclick="fazerLogin()">Entrar no Painel</button>
    </div>

    <div id="view-app" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3>Meus Aparelhos</h3>
            <button onclick="logout()" style="color: var(--red); background: none; border: none; cursor: pointer; font-weight: 600;">Sair</button>
        </div>
        <div id="lista-aparelhos"></div>
    </div>
</div>

<div id="modal">
    <div class="card" style="width: 90%; max-width: 350px;">
        <h3>Configurações</h3>
        <p style="font-size: 12px; color: #64748b;">Copie o token abaixo para configurar o seu ESP8266:</p>
        <div id="display-token" class="token-display"></div>
        <button class="btn" onclick="copiarToken()">📋 Copiar Token</button>
        <button class="btn btn-secondary" onclick="fecharModal()">Fechar</button>
    </div>
</div>

<script>
    const API = 'https://divertipay-server-production.up.railway.app';
    let tokenJWT = localStorage.getItem('token_diverti');

    if (tokenJWT) {
        mostrarDashboard();
    }

    async function fazerLogin() {
        const email = document.getElementById('login-email').value;
        const senha = document.getElementById('login-senha').value;
        const res = await fetch(`${API}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, senha })
        });
        const data = await res.json();
        if (data.token) {
            localStorage.setItem('token_diverti', data.token);
            location.reload();
        } else {
            alert(data.erro || 'Erro ao entrar');
        }
    }

    function logout() {
        localStorage.removeItem('token_diverti');
        location.reload();
    }

    function mostrarDashboard() {
        document.getElementById('view-login').style.display = 'none';
        document.getElementById('view-app').style.display = 'block';
        carregarAparelhos();
        setInterval(carregarAparelhos, 5000); // Atualiza status a cada 5s
    }

    async function carregarAparelhos() {
        try {
            const res = await fetch(`${API}/devices`, {
                headers: { 'Authorization': `Bearer ${tokenJWT}` }
            });
            const aparelhos = await res.json();
            const lista = document.getElementById('lista-aparelhos');
            lista.innerHTML = aparelhos.map(dev => `
                <div class="card">
                    <div style="display: flex; justify-content: space-between;">
                        <strong>${dev.nome}</strong>
                        <span class="status ${dev.online ? 'online' : 'offline'}">
                            ${dev.online ? '● ONLINE' : '○ OFFLINE'}
                        </span>
                    </div>
                    <button class="btn" style="margin-top: 15px;" onclick="enviarCredito(${dev.id})">ENVIAR CRÉDITO</button>
                    <button class="btn btn-secondary" onclick="abrirConfig('${dev.token}')">CONFIGURAR HARDWARE</button>
                </div>
            `).join('');
        } catch (e) { console.error("Erro ao carregar"); }
    }

    async function enviarCredito(id) {
        const qtd = prompt("Quantos pulsos deseja enviar?");
        if (!qtd) return;
        await fetch(`${API}/devices/${id}/pulse`, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${tokenJWT}` 
            },
            body: JSON.stringify({ pulsos: qtd })
        });
        alert("Comando enviado!");
    }

    function abrirConfig(token) {
        document.getElementById('display-token').innerText = token;
        document.getElementById('modal').style.display = 'flex';
    }

    function fecharModal() {
        document.getElementById('modal').style.display = 'none';
    }

    function copiarToken() {
        const t = document.getElementById('display-token').innerText;
        navigator.clipboard.writeText(t).then(() => {
            alert("Token copiado para a área de transferência!");
        });
    }
</script>

</body>
</html>
